name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version release'
          commit: 'chore: version release'
          version: npx changeset version
          publish: npx changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update major version tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Get the latest version tag
          LATEST_TAG=$(git describe --tags --abbrev=0)
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v\([0-9]*\).*/\1/')

          echo "Latest tag: $LATEST_TAG"
          echo "Major version: v$MAJOR"

          # Force-update the major version tag (e.g., v1 → v1.2.3)
          git tag -fa "v$MAJOR" -m "Update v$MAJOR to $LATEST_TAG"
          git push origin "v$MAJOR" --force
